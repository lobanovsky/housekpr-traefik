services:
  docker-proxy:
    image: nginx:alpine
    command: ["/bin/sh", "-c", "sed -i 's/user  nginx;/user  root;/' /etc/nginx/nginx.conf && nginx -g 'daemon off;'"]
    group_add:
      - "1001"
    container_name: docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./nginx-docker-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - housekpr-network

  traefik:
    image: traefik:v3.3.5
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - docker-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./rules:/etc/traefik/rules
      - ./acme.json:/etc/traefik/acme.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.entrypoints=https"
      - "traefik.http.routers.traefik.rule=Host(`traefik.housekpr.ru`)"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.tls.certresolver=letsEncrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.services.traefik-traefik.loadbalancer.server.port=888"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=admin:$$2y$$05$$nwt4UdvIiX6yWz7DFMrqxeT5KsQWwMkd8uoq0p6Lpm9RJU4hh3ftm"
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
    networks:
      - housekpr-network

networks:
  housekpr-network:
    external: true
